name = "BoundaryParticleReservoirPeriodic";
version = "11";

application =
{
	
	app = "BoundaryParticleReservoirPeriodic";
	
	//-----------------------------------------------
	// GPU device selection - enter the name of the GPU
	// on which the application will run. If it cannot
	// find the GPU string it will select the first
	// GPU with the required capabilities.
	// Running the application once and reviewiing the
	// mps.log file will show the currently installed
	// gpu strings.
	//----------------------------------------------
	phys_device		= "NVIDIA RTX 3500 Ada Generation Laptop GPU";
	//phys_device		= "Intel(R) HD Graphics P530"
	
	//===============================================================================
	// Frame configuration section
	//===============================================================================
	//-----------------------------------------------
	// Frame delay in milliseconds. 0 means the system
	// will render as fast as it is able.
	//----------------------------------------------
	frame_delay		= 1.0;
	//-----------------------------------------------
	// The end frame of the simpulation. Application
	// will exit after this frame. Zero means run to
	// infinity
	//----------------------------------------------
	end_frame		= 300;
	//-----------------------------------------------
	// Time step - not yet implimented - for dymnamics
	// will render as fast as it is able.
	//----------------------------------------------
	dt				= 0.05;
	
	// Must be 2 and above
	framesBuffered	= 1; // This is not used. Keep it until we ensure it is not longer in the c++ code
	//===============================================================================
	// Motion/ boundary configuration section
	//===============================================================================
	//initial_view = { rRotZ = 0.0;rRotY=30.625;rRotX=100.042;zoom=0.6;};
	initial_view = { rRotZ = 0.0;rRotY=0.0;rRotX=0.0;zoom=0.6;};
	//wall_type = "WALL_MODEL_SIMPLE";
	//wall_type = "WALL_MODEL_PIPE";
	wall_type = "WALL_MODEL_BOUNDARY_PARTICLE";
	
	// Show the cell array boundary as a cube. 
	// If true this overrides show_wall_as_boundary_cube
	show_cell_boundary_cube = false;
	
	// Show the walls as boundaries. This overridden by show_cell_boundary_cube
	show_wall_as_boundary_cube = false;
	walls = [1.0,4.0,1.0,4.0];
	
	// Gets boundary from obj file.
	boundary_as_obj = false; 
	boundary_file = "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/none.obj";
	// Show particles as spheres.
	particle_as_spheres = false;
	sphere_file = "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/InventorSphere.obj";
	
	wire_frame = true;
	

	//-----------------------------------------------
	// Vertex shader Configuration
	//-----------------------------------------------
	col_color = {red = 1.0; green=0.0; blue=0.0; alpha=1.0;};
	ncol_color = {red = 0.0; green=1.0; blue=0.0; alpha=1.0;};
	clear_color = {red = 0.0; green=0.0; blue=0.0; alpha=1.0;};
	gl_point_size = 1.5;

	//===============================================================================
	// Test configuration section
	//===============================================================================
	do_only_missing_data = false;
	// If this is set to true the program runs thorugh 
	// each of the selected <perfTest> benchmark files for 60 seconds. 
	// If this is set to false it will run the file set in 
	// <testfile> for default of 60 seconds.
	// To set a shorter time see <doAutoWait>.
	doAuto			= false;
	// To perform performance on one file set doAuto to true and this to true.
	// Set test file to the sngle file you want to test.
	doAutoSingleFile		= false;
	stopOnError		= false;
	auto_sleep = 30;
	
	// Set this to zero for 60 secnd wait.
	// Set to any other number to shorten 
	// the test time for each benchmark file.
	seriesLength		= 0; 
	// PerfTest can be one of:
	
	//===============================================================================
	// Shader section for this configuration 
	//===============================================================================
	compileShaders  = true;
	
	gen_glsl_dir			= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic"
	
	frag_boundParticle 		= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/BoundaryParticleReservoirPeriodic.frag";
	frag_boundParticlespv	= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/frag.spv";
	
	vert_boundParticle 		= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/BoundaryParticleReservoirPeriodic.vert";
	vert_boundParticlespv	= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/vert.spv";
	
	/// ############################# vertex #############################################
	frag_kernParticle 		= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/BoundaryParticleReservoirPeriodicP.frag";
	frag_kernParticlespv	= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/frag.spv";
		
	vert_kernParticle 		= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/BoundaryParticleReservoirPeriodicP.vert";
	vert_kernParticlespv	= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/vert.spv";
	
	
	comp_kernParticle 		= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/BoundaryParticleReservoirPeriodicP.comp";
	comp_kernParticlespv	= "C:/_DJ/gPCD/vulkan/sim/BoundaryParticleReservoirPeriodic/comp.spv";
	
	//===============================================================================
	/// ------------------------- Test Configuraton Section
	//===============================================================================
	
	/// Single test files 
	testfile 		= "C:/_DJ/gPCDData/examples/BoundaryParticleReservoirPeriodic100x100x4.tst";
	//testfile 		= "C:/_DJ/gPCDData/examples/PipeReservoirEntry10x10x4.tst";
			
	
	//------------------------------ SEQUENTIAL
	// Increaing number of particle and cells with the same percentage of collions.
	//perfTest		= "testdirPQBST"; 
	//----------------------------- RANDOM
	// Increaing number of particle and cells with the same percentage of collions.
	perfTest		= "testdirPQBRT"; 
	//---------------------------- Collision Fraction benchmark
	// Same particles increasing collsons
	//perfTest		= "testdirCFB";
	//perfTest		= "testdirCFBT";
	//------------------------------ PARTICLE CELL DENSITY
	// Same number particles increase particle per cell	
	//perfTest		= "testdirPCD";
	// Same number particles and cells but increasing collsions	
	//perfTest		= "testdirPCDT";
	// Same amout of particles while reducing the cell numbers
	//------------------------------ DUP CELLS
	//perfTest		= "testdirDUP";
	//------------------------------ Test data output/input directories
	testdirPQBST		= "..\..\..\..\gPCDData\perfDataPQB";
	testdirPQBS			= "..\..\..\..\gPCDData\perfDataPQB";
	testdirPQBRT		= "..\..\..\..\gPCDData\perfDataPQBR";
	testdirPQBR			= "..\..\..\..\gPCDData\perfDataPQBR";
	testdirCFB			= "..\..\..\..\gPCDData\perfDataCFB";
	testdirCFBT			= "..\..\..\..\gPCDData\perfDataCFB";
	testdirPCD			= "..\..\..\..\gPCDData\perfDataPCD";
	testdirPCDT			= "..\..\..\..\gPCDData\perfDataPCD";
	testdirDUP			= "..\..\..\..\gPCDData\perfDataDUP";
	
	//===============================================================================
	/// ------------------------- Validation/Debugging/Extensions
	//===============================================================================
	verbose_rpt 			= true;
	nsight					= false;
	enableValidationLayers 	= true;
	stopondata				= true;
	noCompute				= false;
	// Debug level
	// 	0 means release no debug, no validations etc.
	debugLevel = 1;
	// Debugprintf
	reportCompFramesLessThan = 3;
	reportGraphFramesLessThan = 3;
	framesInFlight		= 1; // Obsolete
	device_extensions 	= ( "VK_NV_shader_sm_builtins","VK_NV_shading_rate_image","VK_EXT_shader_subgroup_ballot","VK_KHR_swapchain",
							"VK_KHR_shader_non_semantic_info","VK_EXT_fragment_shader_interlock",
							"VK_EXT_shader_image_atomic_int64","VK_EXT_shader_atomic_float"  );
	instance_extensions = ( "VK_EXT_debug_utils","VK_EXT_debug_report");
	validation_layers 	= ( "VK_LAYER_KHRONOS_validation" );
	printExtension		= false;
	printDevLimtits		= true;
	
		
	
	
	
			

};
