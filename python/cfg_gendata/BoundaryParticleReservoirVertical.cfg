// ============================================================================
// BoundaryParticleReservoirVertical Python data-generation configuration
//
// This config creates mobile particles and boundary-marker particles.
// Boundary particles mark cells that contain wall segments.
//
// Coordinate convention:
//   x direction: preferred flow direction when flow_angle = 0.0
//   x min: inlet plane
//   x max: positive axial extent
//   y min/y max: lower and upper pipe walls
//   z: retained for 3D particle data and Vulkan cell indexing
// ============================================================================

// Required: selects the generator family used by the front end.
type = "flow";

// Required: output directory for generated .bin, .tst, and .rpt files.
data_dir = "C:/_DJ/gPCDData/examples";

// Required: directory containing the Python generator module.
module_dir = "C:/_DJ/gPCD/python/gbase";

// Required: Python generator loaded by TabFormGenData.
module_class = "BoundaryParticleReservoirVertical.py";

// Required for Python plotter: half-width of the plotted cell neighborhood.
cell_range = 4;

// Required for Python plotter: number of facets used to draw each sphere.
sphere_facets = 15;

// Required for Python plotter: inclusive particle index range to display.
particle_range = [1,1000];

// Required for Python plotter: default RGB particle color.
particle_color = [1.0,0.0,0.0];

// Optional for Python plotter: draw particles as points instead of spheres.
as_points = false;
dynamics_diagnostics = true;



// Optional for Python plotter: vary color by particle/collision state.
vary_color = true;

// Required: base name used for generated output files.
STUDY_NAME = "BoundaryParticleReservoirVertical";

contact_force_measure = "depth";

// Optional: enable HSV colorization in the Python simulation view.
hsv_color = false;

// Optional: draw particle numbers in the Python simulation view.
simulation_particle_numbers = false;

// Optional: HSV saturation when hsv_color is enabled.
hsv_sat = 0.707;

// Optional: HSV value/brightness when hsv_color is enabled.
hsv_val = 1.0;

// Required: directory for Python dynamics reports and diagnostics.
run_debug_dir = "C:/_DJ/gPCDData/examples/rpt/BoundaryParticleReservoirVertical";

// Optional: when true, stop the Python simulation on reported dynamics errors.
exit_on_error = false;

// Required: wall ghost offset as a fraction of particle radius.
//   ghost_offset = wall_contact_offset * radius
wall_contact_offset = 0.0625;

// Required: default particle-owned contact stiffness written to Data.y.
collision_stiffness_q = 0.5;

// Required: Python simulation display frame rate.
frame_rate = 30;

// Required: enables wall processing in the Python dynamics model.
walls_on = true;

// Required: Python simulation window size in pixels.
window_size = (1000, 1000);


// Required: Python viewer zoom.
zoom= 0.25;

// Required: explicit cell counts for the cell-array domain.
cell_array_width = 10;
cell_array_height = 10;
cell_array_depth = 10;

// Required: cell occupancy list capacity written to the .tst file.
cell_occupancy_list_size= 64;

// Required for .tst: compute dispatch y dimension.
dispatchy = 1;

// Required for .tst: compute dispatch z dimension.
dispatchz = 1;

// Required for .tst: compute workgroup x count.
workGroupsx = 1;

// Required for .tst: compute workgroup y count.
workGroupsy = 1;

// Required for .tst: compute workgroup z count.
workGroupsz = 1;


// Required: tells ForceDynamicsBase to load particles from bin_file.
pdata_from_file = true;

//include_file = "C:/_DJ/gPCD/python/cfg_gendata/sub_BPRPPy.cfg"
include_file = "C:/_DJ/gPCD/python/cfg_gendata/sub_BPRPVk.cfg"
