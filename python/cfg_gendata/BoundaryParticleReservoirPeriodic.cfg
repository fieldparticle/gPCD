// ============================================================================
// BoundaryParticleReservoirPeriodic Python data-generation configuration
//
// This config creates a preallocated reservoir of inactive mobile particles and
// boundary-marker particles. Mobile particles are released through the inlet by
// Data.w birth frame. Boundary particles mark cells that contain wall segments.
//
// Coordinate convention:
//   x direction: preferred flow direction when flow_angle = 0.0
//   x min: inlet plane
//   x max: outlet/retirement plane
//   y min/y max: lower and upper pipe walls
//   z: retained for 3D particle data and Vulkan cell indexing
// ============================================================================

// Required: selects the generator family used by the front end.
type = "flow";

// Required: output directory for generated .bin, .tst, and .rpt files.
data_dir = "C:/_DJ/gPCDData/examples";

// Required: directory containing the Python generator module.
module_dir = "C:/_DJ/gPCD/python/gbase";

// Required: Python generator loaded by TabFormGenData.
module_class = "BoundaryParticleReservoirPeriodic.py";

// Required for Python plotter: half-width of the plotted cell neighborhood.
cell_range = 4;

// Required for Python plotter: number of facets used to draw each sphere.
sphere_facets = 15;

// Required for Python plotter: inclusive particle index range to display.
particle_range = [1,1000];

// Required for Python plotter: default RGB particle color.
particle_color = [1.0,0.0,0.0];

// Optional for Python plotter: draw particles as points instead of spheres.
as_points = false;



// Optional for Python plotter: vary color by particle/collision state.
vary_color = true;

// Required: base name used for generated output files.
STUDY_NAME = "BoundaryParticleReservoirPeriodic";

contact_force_measure = "depth";
// Optional: enable HSV colorization in the Python simulation view.
hsv_color = false;
// Optional: draw particle numbers in the Python simulation view.
simulation_particle_numbers = false;

// Optional: HSV saturation when hsv_color is enabled.
hsv_sat = 0.707;

// Optional: HSV value/brightness when hsv_color is enabled.
hsv_val = 1.0;

// Required: directory for Python dynamics reports and diagnostics.
run_debug_dir = "C:/_DJ/gPCDData/examples/rpt/BoundaryParticleReservoirPeriodic";

// Optional: when true, stop the Python simulation on reported dynamics errors.
exit_on_error = false;

// Required: wall ghost offset as a fraction of particle radius.
//   ghost_offset = wall_contact_offset * radius
wall_contact_offset = 0.0625;

// Required: default particle-owned contact stiffness written to Data.y.
collision_stiffness_q = 0.5;

// Required: selects reservoir lifecycle and wall behavior.
// Options:
//   "pipe_reservoir_entry" - Data.w controls birth/live/dead state;
//                            X planes are inlet/outlet process limits and
//                            only Y walls are solid pipe walls.
//   "simple_reservoir"     - Data.w controls birth/live/dead state;
//                            simple reservoir wall behavior is selected.
// Any other value disables reservoir lifecycle in ForceDynamics.
flow_type = "pipe_reservoir_entry";

// Required: Python simulation display frame rate.
frame_rate = 30;

// Required: enables wall processing in the Python dynamics model.
walls_on = true;

// Required: Python simulation window size in pixels.
window_size = (1000, 1000);


// Required: Python viewer zoom.
zoom= 0.25;

// Required: Vulkan/Python cell-array side length written to the .tst file.
side_len = 10;

// Required: cell occupancy list capacity written to the .tst file.
cell_occupancy_list_size= 64;

// Required for .tst: compute dispatch y dimension.
dispatchy = 1;

// Required for .tst: compute dispatch z dimension.
dispatchz = 1;

// Required for .tst: compute workgroup x count.
workGroupsx = 1;

// Required for .tst: compute workgroup y count.
workGroupsy = 1;

// Required for .tst: compute workgroup z count.
workGroupsz = 1;

// Optional: deterministic random seed for repeatable reservoir generation.
reservoir_random_seed = 12345;

// Optional: maximum extra birth-frame jitter added per release wave.
reservoir_birth_jitter_frames = 20;

// Optional: fraction of available y-spacing gap used for random y jitter.
reservoir_position_jitter_fraction = 0.75;

// Optional: legacy lateral-velocity randomization switch.
reservoir_random_lateral_velocity = true;

// Optional: maximum legacy lateral velocity magnitude.
reservoir_lateral_velocity = 0.05;

// Required: nominal inlet speed and fallback flow speed.
reservoir_starting_vx = 0.02;

// Required: first birth frame assigned to the first reservoir wave.
//   first_wave_birth_frame = reservoir_start_birth
reservoir_start_birth = 10.0;

// Required: diameter spacing factor used to compute frames between waves.
//   required_wave_distance = reservoir_spacing_factor * (2 * radius)
reservoir_spacing_factor = 1.05;

// Optional: preferred flow angle in degrees.
//   flow_direction = (cos(flow_angle), sin(flow_angle))
flow_angle = 0.0;

// Optional: velocity-direction alignment with flow_angle.
// The directed velocity contribution is proportional to flow_alignment; the
// random contribution is proportional to (1 - flow_alignment).
flow_alignment = 0.85;

// Required: tells ForceDynamicsBase to load particles from bin_file.
pdata_from_file = true;

//include_file = "C:/_DJ/gPCD/python/cfg_gendata/sub_BPRPPy.cfg"
include_file = "C:/_DJ/gPCD/python/cfg_gendata/sub_BPRPVk.cfg"
