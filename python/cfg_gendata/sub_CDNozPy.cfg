// ============================================================================
// sub_CDNozCharLines Python data-generation configuration
//
// 	Speicifc Chnages:
// reservoir_starting_vx = 0.05; from 0.005 to 0.05
// 
// ============================================================================

// Required: default particle-owned contact stiffness written to Data.y.
collision_stiffness_q = 0.5;

// Required: simulation timestep.
dt= 0.5;

// Required: mobile particle radius used for generation and collision.
radius = 0.25;



// Required: binary particle file consumed by the Python runner.
output_file_prefix = "CDNozPy";

// Temporary upper bound that includes the chamber packing and wall markers.
particle_range = [1,500];

// Required: Python viewer zoom.
zoom= 1.0;

// ============================================================================


// Required for Python plotter: axis limits for the particle preview.
x_axis_lims = [0.0,90.0];
y_axis_lims = [10.0,40.0];
z_axis_lims = [0.75,1.25];

//  Distance between particle perimiters
particle_separation_distance 	= 1.0;

// Required: explicit cell counts for the cell-array domain.
cell_array_width 				= 90;
cell_array_height 				= 40;
cell_array_depth 				= 5;

view_center = [45,25,2];

// Frame when the piston begins moving.
piston_start_frame = 20;


//death_bounds = [
//    x_min, x_max,
//    y_min, y_max,
//    z_min, z_max
//];

death_bounds = [
    1, 88,
    12, 38,
    0, 4
];

initial_particle_velocity = [ 0.05, 0.0, 0.0 ];
piston_velocity = [ 0.05, 0.0, 0.0 ];

// 2D packing curves derive x/y packing bounds. Z is configured separately.
packing_z_bounds = [0, 3];

// Parametric polynomial wall segments.
// [ax, bx, cx, dx, ay, by, cy, dy, wall_flag, curve_role]
// x(t) = ax + bx*t + cx*t^2 + dx*t^3
// y(t) = ay + by*t + cy*t^2 + dy*t^3
// 0 <= t <= 1
// wall_flag: 3=lower wall, 4=upper wall
// curve_role:
//   1 = packing_curve  : used to derive reservoir packing and piston travel
//   2 = boundary_curve : collision boundary, ignored for reservoir packing
curve_wall_segments = (
    // Straight piston chamber, x=2 through x=20.
    [ 2.0, 18.0, 0.0, 0.0, 15.0,  0.0,  0.0, 0.0, 3.0, 1.0],
    [ 2.0, 18.0, 0.0, 0.0, 35.0,  0.0,  0.0, 0.0, 4.0, 1.0],

    // Constant-radius inlet, x=20 through x=30.
    [20.0, 10.0, 0.0, 0.0, 15.0,  0.0,  0.0, 0.0, 3.0, 2.0],
    [20.0, 10.0, 0.0, 0.0, 35.0,  0.0,  0.0, 0.0, 4.0, 2.0],

    // Quadratic convergence, x=30 through x=50.
    [30.0, 20.0, 0.0, 0.0, 15.0,  5.0, -2.5, 0.0, 3.0, 2.0],
    [30.0, 20.0, 0.0, 0.0, 35.0, -5.0,  2.5, 0.0, 4.0, 2.0],

    // Constant-radius throat, x=50 through x=55.
    [50.0,  5.0, 0.0, 0.0, 17.5,  0.0,  0.0, 0.0, 3.0, 2.0],
    [50.0,  5.0, 0.0, 0.0, 32.5,  0.0,  0.0, 0.0, 4.0, 2.0],

    // Quadratic divergence, x=55 through x=75.
    [55.0, 20.0, 0.0, 0.0, 17.5,  0.0, -2.5, 0.0, 3.0, 2.0],
    [55.0, 20.0, 0.0, 0.0, 32.5,  0.0,  2.5, 0.0, 4.0, 2.0],

    // Constant-radius exit, x=75 through x=85.
    [75.0, 10.0, 0.0, 0.0, 15.0,  0.0,  0.0, 0.0, 3.0, 2.0],
    [75.0, 10.0, 0.0, 0.0, 35.0,  0.0,  0.0, 0.0, 4.0, 2.0]
);


// Required: tells ForceDynamicsBase to load particles from bin_file.
pdata_from_file = true;

// Required: enables or disables study/batch generation mode.
study=false;

// Required when study is true; otherwise kept at zero.
num_studies = 0;

