// ============================================================================
// Pipe Reservoir Entry data-generation configuration
//
// This config creates a preallocated reservoir of inactive particles for a pipe
// entry-flow simulation. The dynamics/runtime layer releases particles through
// an inlet plane at a configured particle rate. Particles that pass the outlet
// are handled according to RUN_CONFIGURATION.escape_mode.
//
// Coordinate convention used by this simulation:
//   x direction: flow direction
//   x min: inlet plane, not a solid wall for pipe_reservoir_entry
//   x max: outlet/escape plane, not a solid wall for pipe_reservoir_entry
//   y min/y max: lower and upper horizontal pipe walls
//   z: retained for 3D particle data and Vulkan cell indexing
// ============================================================================

// Output folder for generated .bin and .tst files.
data_dir_help = "Where bin and tst file will be written";
data_dir = "C:/_DJ/gPCDData/examples";

// Python generator module loaded by TabFormGenData.
module_dir = "C:/_DJ/gPCD/python/gbase";
module_class = "GenPipeReservoirEntry.py";

// General generator/UI options. Most of these are shared by other generators.
selections_file_help = "Name location of selections file.";
particle_separation = 0.15;
write_block_len_help = "Write particles in blocks instead of one at a time or all.";
write_block_len = 10000;
particle_enumeration = "random";
test_files_only = false;
replace_all = true;
cell_range = 2;
cell_array_size = 0;
sphere_facets = 15;
particle_range = [1,32];
particle_color = [1.0,0.0,0.0];
test_indexing_log = "index_test_report.log"
as_points = false;
axis_lims = [0.5,8.0]; 
vary_color = true;



STUDY_NAME = "PipeReservoirEntry";

RUN_CONFIGURATION = {
	run_debug = true;
	collision_stiffness_q = 1.1;
	// Flow model selected by the Python dynamics layer and intended GLSL path.
	// For this mode, X boundaries are inlet/outlet planes while Y boundaries
	// are solid pipe walls.
	flow_type = "pipe_reservoir_entry";

	// Viewer/runtime timing. dt is the simulation timestep; substeps divides
	// dt into smaller integration steps in the Python viewer.
	frame_rate = 30;
	plot_report = false;
    dt= 0.05;
    substeps= 5;

	// Enables wall contact processing. In pipe_reservoir_entry mode, only the
	// lower/upper Y walls are treated as solid walls.
	walls_on = true;
    window_size = (1000, 1000);

	// Domain extents written to the .tst file. These also define the default
	// inlet/outlet and pipe wall positions when the more specific fields below
	// are not supplied.
    WallXMIN = 1.0;				// Inlet plane
	WallXMAX = 9.0;				// Outlet plane
	WallYMIN = 1.0;				// Lower wall
	WallYMAX =	9.0;			// Upper wall
	WallZMIN = 1.0;
	WallZMAX =	9.0;

	// Reservoir release geometry.
	// New particles are activated at inlet_x and randomized between
	// pipe_y_min + radius and pipe_y_max - radius.
	inlet_x = 1.0;
	outlet_x = 8.0;
	pipe_y_min = 2.0;
	pipe_y_max = 6.0;

	// Reservoir release rate and initial inlet velocity.
	// particle_rate is particles per simulation-time unit. Fractional releases
	// are accumulated over time so the long-term average is preserved.
	particle_rate = 2.0;
	inlet_velocity = 0.05;

	// Number of particles preallocated into the inactive reservoir. The binary
	// file contains all reservoir particles from the start; state_flg controls
	// whether each particle is inactive, active, escaped, or retained.
	reservoir_particle_count = 4;
	particle_mass = 1.0;

	// Outlet behavior when an active particle passes outlet_x:
	//   0 = recycle to reservoir for later reinjection
	//   1 = escaped/out of system; do not reuse
	//   2 = retained/stored; do not move or reuse
	escape_mode = 1;

	// Viewer zoom and Vulkan cell-grid sizing.
    zoom= 0.5;
	side_len = 10;
    cell_occupancy_list_size= 64;

	// Compute dispatch/workgroup settings written to the .tst file.
	dispatchx = 3;
	dispatchy = 1;
	dispatchz = 1;
	workGroupsx = 1;
	workGroupsy = 1;
	workGroupsz = 1;

	// Particle radius used by the generator and collision/contact code.
	radius = 0.25;

	// Compatibility fields used by older performance/collision generators.
	// They are kept at zero for this reservoir-entry setup.
	particles_per_cell = 0;
	num_particle_colliding = 0;
	exp_collisions_per_cell = 0;
	act_collisions_per_cell = 0;
	particles_in_row=0;
	collision_density = 0;
	pdensity = 0;
	
}


// The runner reads particle positions from the generated .bin file.
pdata_from_file = true;
num_particles_x = 2;
num_particles_y = 6;
