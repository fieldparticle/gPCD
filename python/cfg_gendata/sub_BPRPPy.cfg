// ============================================================================
// BoundaryParticleReservoirPeriodic: reduced Python profile
// ============================================================================
//
// This file is included by BoundaryParticleReservoirPeriodic.cfg. The parent
// cfg is loaded first, then every value in this file replaces a parent value
// with the same name. Values not listed here continue to come from the parent.
//
// Purpose:
//   - small enough for interactive Python ForceDynamics testing;
//   - short reservoir release train;
//   - boundary-particle horizontal pipe;
//   - intended starting point for deferred-birth crowding tests.
//
// Derived population equations:
//   mobile_particle_count = particle_columns * particles_per_row
//   total_particle_count = null_particle_count + mobile_particle_count
//                          + boundary_particle_count
//   dispatchx = null_particle_count + mobile_particle_count
//
// Parent variables that materially affect the calculations below include:
//   reservoir_starting_vx
//   flow_alignment
//   reservoir_spacing_factor
//   reservoir_birth_jitter_frames
//   zoom
// ============================================================================

// --------------------------------------------------------------------------
// Shared preview and Python game-camera bounds
// --------------------------------------------------------------------------
// PlotParticles uses all three axis ranges. SimulationRunner uses the x and y
// ranges first and falls back to legacy Wall* values only when these are absent.
// SimulationRunner then applies zoom around each axis-range center.
x_axis_lims = [0.0,10.0];
y_axis_lims = [0.0,6.0];
z_axis_lims = [0.0,3.0];

// --------------------------------------------------------------------------
// Reservoir lifecycle planes
// --------------------------------------------------------------------------
// A positive-x flow is born inside reservoir_inlet_x. The runtime center is:
//   birth_x = reservoir_inlet_x
//             + max(reservoir_birth_spacing_factor, minimum_birth_factor)
//               * (2 * radius)
reservoir_inlet_x = 1.0;

// A live particle is retired when its center reaches this plane. It must obey:
//   reservoir_outlet_x > wall_x_max
// so the terminal wall can respond before lifecycle removal.
reservoir_outlet_x = 5.0;

// --------------------------------------------------------------------------
// Boundary-particle wall geometry
// --------------------------------------------------------------------------
// Closed horizontal pipe length along x. The inlet plane comes from
// reservoir_inlet_x and the outlet wall is derived as:
//   wall_x_min = reservoir_inlet_x
//   wall_x_max = reservoir_inlet_x + wall_boundary_length
// Vertical evaluator markers close both x ends. Horizontal evaluator markers
// cover ymin/ymax. Exact duplicate corner coordinates are emitted only once.
wall_boundary_length = 3.0;

// Selects boundary-marker processing in generated Vulkan test metadata. Python
// ForceDynamics recognizes markers from ptype=1, not from this string alone.
// The commented alternatives remain examples, not active selections.
//wall_type = "WALL_MODEL_SIMPLE";
//wall_type = "WALL_MODEL_PIPE";
wall_type = "WALL_MODEL_BOUNDARY_PARTICLE";

// Selects horizontal marker generation. Each generated marker independently
// stores evaluator id 1 in pdata.temp_vel/Data.z. This string selects generator
// orientation only; runtime wall evaluation uses each target marker's Data.z.
boundary_particle_function = "horizontal_wall";

// Force the generated cubic cell-array side length. This field intentionally
// retains its historical spelling. It controls generated
// geometry and .tst CellAryW/H/L; it is not an alias for parent side_len.
//
// The uncentered packed pipe width is:
//   ceil(particles_per_row / particles_per_cell_row) + 2
// The centered cross-axis offset and wall bounds are:
//   pipe_offset = max(0, (over_ride_side_length - packed_pipe_width) / 2)
//   wall_y_min = pipe_offset + minimum_cell_center
//   wall_y_max = pipe_offset + packed_pipe_width - one_cell
over_ride_side_length = 7;

// --------------------------------------------------------------------------
// Particle geometry and integration
// --------------------------------------------------------------------------
// Mobile particle radius. The diameter is:
//   diameter = 2 * radius
radius = 0.1;

// Simulation timestep used by both dynamics integration and wave-frame spacing.
dt = 0.5;

// Additional center spacing as a fraction of diameter:
//   particle_spacing = (2 * radius)
//                      * (1 + fraction_of_diameter_separation)
fraction_of_diameter_separation = 0.1;

// Cell-row packing must satisfy:
//   particles_per_cell_row * particle_spacing <= cell_length
particles_per_cell_row = 4;

// Number of particles across each release wave.
particles_per_row = 14;

// Number of independently scheduled release waves.
particle_columns = 10;

// Release timing equations:
//   forward_speed_for_spacing = reservoir_starting_vx
//                               * max(flow_alignment,
//                                     minimum_flow_alignment)
//   required_wave_distance = reservoir_spacing_factor * (2 * radius)
//   minimum_frame_interval = ceil(required_wave_distance
//                                 / (forward_speed_for_spacing * dt))
//   wave_frame_step = minimum_frame_interval
//                     + reservoir_birth_jitter_frames
//   wave_birth_frame = reservoir_start_birth
//                      + wave_index * wave_frame_step
// Each particle may also receive birth jitter in the inclusive interval:
//   [0, reservoir_birth_jitter_frames]

// --------------------------------------------------------------------------
// Front-end study and output selection
// --------------------------------------------------------------------------
// Normal single-run mode. When study is true, TabFormGenData iterates
// num_studies and creates a separate inline study run for each index.
study = false;
num_studies = 0;

// Produces:
//   C:/_DJ/gPCDData/examples/BoundaryParticleReservoirPeriodicPy.bin
//   C:/_DJ/gPCDData/examples/BoundaryParticleReservoirPeriodicPy.tst
// The Python dynamics runner loads the .bin because parent pdata_from_file=true.
output_file_prefix = "BoundaryParticleReservoirPeriodicPy";
