// ============================================================================
// LightingBall Python data-generation configuration
//
// This config models free-flow inlet streaming with boundary-marker particles.
// Mobile particles are generated as timed release waves, not as a packed
// compression reservoir.
//
// Coordinate convention:
//   x direction: preferred flow direction when flow_angle = 0.0
//   x min: inlet plane
//   x max: positive axial extent
//   y min/y max: lower and upper pipe walls
//   z: retained for 3D particle data and Vulkan cell indexing
// ============================================================================

// Required: selects the generator family used by the front end.
type							= "flow";

dimensions 						= 3;
// Required: output directory for generated .bin, .tst, and .rpt files.
data_dir 						= "C:/_DJ/gPCDData/examples";

// Required: directory containing the Python generator module.
module_dir 						= "C:/_DJ/gPCD/python/gbase";

// Required: Python generator loaded by TabFormGenData.
// GenLightingBall.py owns timed inlet release for LightingBall flow.
module_class 					= "GenLightingBall.py";

// Required for Python plotter: half-width of the plotted cell neighborhood.
cell_range 						= 4;

// Required for Python plotter: number of facets used to draw each sphere.
sphere_facets 					= 15;

// Required for Python plotter: inclusive particle index range to display.
particle_range 					= [1,1085];

// Required for Python plotter: default RGB particle color.
particle_color 					= [1.0,0.0,0.0];

// Optional for Python plotter: draw particles as points instead of spheres.
as_points 						= false;


// Optional for Python plotter: vary color by particle/collision state.
vary_color 						= true;

// Required: base name used for generated output files.
STUDY_NAME						= "LightingBall";

contact_force_measure 			= "depth";

plot_hsv_wheel					= false;
// Optional: enable velocity colorization in the Python simulation view.

// Optional: draw particle numbers in the Python simulation view.
simulation_particle_numbers 	= false;

// Optional: HSV saturation for VELOCITY color mode.
hsv_sat 						= 0.707;

// Optional: HSV value/brightness for VELOCITY color mode.
hsv_val 						= 1.0;

// Required: directory for Python dynamics reports and diagnostics.
// Optional: when true, stop the Python simulation on reported dynamics errors.
exit_on_error 					= false;

// Required: wall ghost offset as a fraction of particle radius.
//   ghost_offset = wall_contact_offset * radius
wall_contact_offset 			= 0.0625;

// Required: default particle-owned contact stiffness written to Data.y.
collision_stiffness_q 			= 4.0;

compression_stiffness_gain 		= 8.0;
compression_stiffness_power 	= 2.0;


min_compression_frames			= 10.0;
target_penetration_fraction 	= 0.5;
hard_penetration_fraction 		= 0.75;
// Required: Python simulation display frame rate.
frame_rate 						= 0.0;

// Required: Python simulation window size in pixels.
window_size 					= (1500, 1000);
// XY view: looking along Z
view = [0, 0, 0];

// XZ view: looking along Y
//view = [90, 0, 0];

// ZY view: looking along X
//view = [0, 90, 0];

// angled 3D view
//view = [60, 0, 35];

// LIVE: material table. Particles default to material_id 0 unless explicitly tagged.
material_properties = (
  {
    material_id 		= 0;
    name 				= "photon";
    particle_type 		= "photon";
    relative_mass 		= 1.0;
    thermal_velocity 	= 0.0;
    color_mode 			= "LUMENS";
    color 				= [0.5, 0.5, 1.0, 1.0];
    debug_visible 		= false;
    debug_color 		= [0.0, 0.0, 1.0, 1.0];
    cell_density 		= 0.0;
  },
  {
    material_id 		= 1;
    name 				= "sphere";
    particle_type 		= "regular";
    relative_mass 		= 1.0;
    thermal_velocity 	= 0.0;
    color_mode 			= "SOLID";
    color 				= [1.0, 1.0, 0.0, 1.0];
    debug_visible 		= false;
    debug_color 		= [0.0, 0.0, 0.0, 0.0];
    cell_density 		= 0.0;
  },
  {
    material_id 		= 2;
    name 				= "box_wall";
    particle_type 		= "regular";
    relative_mass 		= 1.0;
    thermal_velocity 	= 0.0;
    color_mode 			= "SOLID";
    color 				= [0.0, 0.0, 0.0, 0.0];
    debug_visible 		= false;
    debug_color 		= [0.0, 0.0, 0.0, 0.0];
    cell_density 		= 0.0;
  }
);
//--------------------------pip 
dynamics_diagnostics 			= true;
auto_cap_frames 				= true;
rpt_frames 						= ["0:300"];
run_debug_dir 					= "C:/_DJ/gPCDData/examples/rpt/LightingBall";
// Required: Python viewer zoom.



// Required: tells ForceDynamicsBase to load particles from bin_file.
pdata_from_file 				= true;


include_file = "C:/_DJ/gPCD/python/cfg_gendata/LightingBall_Vk.inc";
//include_file = "C:/_DJ/gPCD/python/cfg_gendata/LightingBall_Py.inc";

duplicates_list_size		= 32;
