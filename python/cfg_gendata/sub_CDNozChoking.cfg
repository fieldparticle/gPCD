// ============================================================================
// sub_CDNozCharLines Python data-generation configuration
//
// 	Speicifc Chnages:
// reservoir_starting_vx = 0.05; from 0.005 to 0.05
// 
// ============================================================================


// Required: nominal inlet speed and fallback flow speed.
reservoir_starting_vx = 0.005;

// Required: binary particle file consumed by the Python runner.
output_file_prefix = "CDNozzleChoking005";

// ============================================================================

// Required for Python plotter: axis limits for the particle preview.
x_axis_lims = [1.0,65.0];
y_axis_lims = [40.0,60.0];
z_axis_lims = [0.0,3.0];


// Required: default particle-owned contact stiffness written to Data.y.
collision_stiffness_q = 0.5;
// Optional: deterministic random seed for repeatable reservoir generation.
reservoir_random_seed = 12345;

// Optional: maximum extra birth-frame jitter added per release wave.
reservoir_birth_jitter_frames = 20;

// Optional: fraction of available y-spacing gap used for random y jitter.
reservoir_position_jitter_fraction = 0.75;

// Optional: legacy lateral-velocity randomization switch.
reservoir_random_lateral_velocity = true;

// Optional: maximum legacy lateral velocity magnitude.
reservoir_lateral_velocity = 0.05;


// Required: first birth frame assigned to the first reservoir wave.
reservoir_start_birth = 10.0;

// Required: diameter spacing factor used to compute frames between waves.
reservoir_spacing_factor = 1.05;

// Optional: preferred flow angle in degrees; 0.0 means +x.
flow_angle = 00.0;
// Optional: velocity-direction alignment with flow_angle.
// 1.0 is fully directed flow; 0.0 is fully random direction.
flow_alignment = 0.85;

//wall_type = "WALL_MODEL_SIMPLE";
//wall_type = "WALL_MODEL_PIPE";
wall_type = "WALL_MODEL_BOUNDARY_PARTICLE";

// Required: mobile particle radius used for generation and collision.
radius = 0.1;
boundary_particle_function = "cd_nozzle_wall";
over_ride_side_length = 100;

nozzle_inlet_length = 10.0;
nozzle_converge_length = 20.0;
nozzle_throat_length = 5.0;
nozzle_diverge_length = 20.0;
nozzle_exit_length = 10.0;

nozzle_inlet_radius = 10.0;
nozzle_throat_radius = 7.5;
nozzle_exit_radius = 10.0;

// Dedicated reservoir lifecycle planes. They are independent of the analytic
// nozzle wall geometry.
reservoir_inlet_x = 1.0;
reservoir_outlet_x = 70.0;

// Total analytic nozzle wall length: inlet + converge + throat + diverge + exit.
wall_boundary_length = 65.0;

// Dedicated analytic nozzle origin and centerline.
nozzle_start_x = 1.0;
nozzle_center_y = 50.0;

// Required: tells ForceDynamicsBase to load particles from bin_file.
pdata_from_file = true;

// Required: enables or disables study/batch generation mode.
study=false;

// Required when study is true; otherwise kept at zero.
num_studies = 0;

// Required - For parabola Simulation: number of reservoir release columns/waves.
particle_columns = 1000;

// Required: number of mobile particles per release wave.
particles_per_row = 100;

particles_per_cell_row = 4;

// Required: additional spacing as a fraction of particle diameter.
fraction_of_diameter_separation = 0.2;


