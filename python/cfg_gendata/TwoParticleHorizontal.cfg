// Cubic parametric wall format:
// [ax, bx, cx, dx, ay, by, cy, dy, wall_flag]
// x(t) = ax + bx*t + cx*t^2 + dx*t^3
// y(t) = ay + by*t + cy*t^2 + dy*t^3
// 0 <= t <= 1
// Segment direction determines the outward right-hand normal:
// normal = (tangent_y, -tangent_x).
// wall_flag is only a positive physical-wall identifier.
