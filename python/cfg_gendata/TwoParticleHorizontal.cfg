    };
};

// 3D rectangular-wall format:
// Used by dimensions = 3 simulations. Each keyed item describes one rectangular
// wall patch in 3D space. origin is one rectangle corner. u_axis/v_axis define
// the rectangle plane. normal points into the valid particle region.
