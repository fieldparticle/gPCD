    wall1 = {
        boundary_kind = "regular";
        function = "x_of_y";
        u_start = 1;
        u_end = 4;
        f_start = 1;
        a1 = 0;
        a2 = 0;
        a3 = 0;
        normal_sign = -1;
        wall_flag = 1;
    };
    wall2 = {
        boundary_kind = "regular";
        function = "x_of_y";
        u_start = 1;
        u_end = 4;
        f_start = 4;
        a1 = 0;
