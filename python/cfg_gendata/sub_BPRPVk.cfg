// ============================================================================
// BoundaryParticleReservoirPeriodic: large Vulkan profile
// ============================================================================
//
// This file is included by BoundaryParticleReservoirPeriodic.cfg. The parent
// cfg is loaded first, then every value in this file replaces a parent value
// with the same name. Values not listed here continue to come from the parent.
//
// Purpose:
//   - large mobile-particle population for Vulkan execution;
//   - particle_columns columns with particles_per_row per column;
//   - horizontal boundary-particle pipe centered in the configured cell array;
//   - statistical flow and crowding tests after Python behavior is verified.
//
// Derived population equations:
//   mobile_particle_count = particle_columns * particles_per_row
//   total_particle_count = null_particle_count + mobile_particle_count
//                          + boundary_particle_count
//   dispatchx = null_particle_count + mobile_particle_count
//
// Boundary markers are stored after mobile particles. They are included in
// num_particles but excluded from source compute dispatch.
// ============================================================================

// --------------------------------------------------------------------------
// Shared preview and Python game-camera bounds
// --------------------------------------------------------------------------
// PlotParticles uses all three axis ranges. SimulationRunner uses the x and y
// ranges first and falls back to legacy Wall* values only when these are absent.
// The Python game view applies zoom to these nominal limits. The static preview
// uses the configured limits directly.
x_axis_lims = [1.0,65.0];
y_axis_lims = [40.0,60.0];
z_axis_lims = [0.0,3.0];

// --------------------------------------------------------------------------
// Reservoir inlet position
// --------------------------------------------------------------------------
// Positive-x inlet coordinate used for particle and marker placement.
reservoir_inlet_x = 1.0;

// --------------------------------------------------------------------------
// Boundary-particle wall geometry
// --------------------------------------------------------------------------
// Closed marker-wall length along positive x. Generated geometry follows:
//   wall_x_min = reservoir_inlet_x
//   wall_x_max = reservoir_inlet_x + wall_boundary_length
// Vertical evaluator markers close both x ends. Horizontal evaluator markers
// cover ymin/ymax. Exact duplicate corner coordinates are emitted only once.
wall_boundary_length = 19.0;

// Vulkan wrapper wall-model selection written to the generated .tst file.
// Python ForceDynamics recognizes boundary markers from ptype=1.
//wall_type = "WALL_MODEL_SIMPLE";
//wall_type = "WALL_MODEL_PIPE";
wall_type = "WALL_MODEL_BOUNDARY_PARTICLE";

// Selects horizontal marker generation. Each generated marker independently
// stores the evaluator ID in ptype. This string selects generator orientation
// only; runtime wall evaluation uses the target marker's ptype-derived Data.z.
boundary_particle_function = "horizontal_wall";

// Force the generated cubic cell-array side length. This controls
// generated particle geometry and .tst CellAryW/H/L. It is intentionally
// distinct from the parent side_len runtime field.
//
// Physical wall separation is calculated from the release row:
//   safe_clearance = radius + radius*wall_contact_offset
//                    + max_position_jitter + epsilon
//   wave_span = (particles_per_row - 1) * particle_spacing
//   wall_span = wave_span + 2*safe_clearance
//   wall_y_min = (cell_array_height - wall_span) / 2
//   wall_y_max = wall_y_min + wall_span

// Explicit cell counts currently preserve the effective 100x100x100 domain.
cell_array_width = 100;
cell_array_height = 100;
cell_array_depth = 100;

// --------------------------------------------------------------------------
// Particle geometry and integration
// --------------------------------------------------------------------------
// Mobile particle radius. The diameter is:
//   diameter = 2 * radius
radius = 0.1;

// Simulation timestep used by integration.
dt = 0.5;

// Surface-to-surface distance between adjacent packed particles.
particle_separation_distance = 0.1;

// Cell-row packing must satisfy:
//   particles_per_cell_row * particle_spacing <= cell_length
particles_per_cell_row = 4;

// The transverse particle span of one column is:
//   wave_span = (particles_per_row - 1) * particle_spacing
particles_per_row = 100;

// Total generated mobile particles are:
//   mobile_particle_count = particle_columns * particles_per_row
particle_columns = 100;


// --------------------------------------------------------------------------
// Front-end study and output selection
// --------------------------------------------------------------------------
study = false;
num_studies = 0;

// Produces:
//   C:/_DJ/gPCDData/examples/BoundaryParticleReservoirPeriodicVk.bin
//   C:/_DJ/gPCDData/examples/BoundaryParticleReservoirPeriodicVk.tst
output_file_prefix = "BoundaryParticleReservoirPeriodicVk";
