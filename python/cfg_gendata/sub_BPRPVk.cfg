// ============================================================================
// BoundaryParticleReservoirHorizontal: large Vulkan profile draft
// ============================================================================
//
// This profile describes one rectangular piston chamber followed immediately
// by a symmetric linear converging nozzle. The generator derives piston
// limits, nozzle endpoints, wall equations, normals, evaluator IDs, marker
// placement, and particle counts from these physical inputs.
//
// This profile uses the same chamber and finite-line contract as the reduced
// Python profile. Select it from the parent cfg for Vulkan-scale generation.
// ============================================================================

// --------------------------------------------------------------------------
// Rectangular cell domain
// --------------------------------------------------------------------------
cell_array_width  = 100;
cell_array_height = 30;
cell_array_depth  = 5;

// --------------------------------------------------------------------------
// Physical piston chamber
// --------------------------------------------------------------------------
// Order:
//   x_start, x_end,
//   y_bottom, y_top,
//   z_front, z_back
//
// Derived:
//   piston_start_x = chamber_bounds.x_start
//   piston_stop_x  = chamber_bounds.x_end
//   nozzle_start_x = chamber_bounds.x_end
chamber_bounds = [
     2.0, 80.0,
     5.0, 25.0,
     0.0,  3.0
];

// --------------------------------------------------------------------------
// Explicit finite linear wall segments
// --------------------------------------------------------------------------
// Each row is:
//   [A, B, C, x_start, y_start, x_end, y_end, wall_flag]
//
// Wall equation:
//   A*x + B*y + C = 0
//
// Outward unit normal:
//   normal = (A, B) / sqrt(A*A + B*B)
//
// The two endpoints limit the otherwise infinite line. This representation
// supports horizontal, vertical, and sloped walls with the same evaluator.
// wall_flag 3 identifies the lower wall and wall_flag 4 the upper wall.
//
// These values describe:
//   chamber lower: y = 5
//   chamber upper: y = 25
//   nozzle lower:  y = 5 + 0.5*(x - 80)
//   nozzle upper:  y = 25 - 0.5*(x - 80)
// Straight piston-chamber walls: x=2 through x=80.
linear_chamber_segments = (
    // Lower chamber wall: y=5, wall_flag=3.
    [0.0, -1.0,   5.0,  2.0,  5.0, 80.0,  5.0, 3.0],
    // Upper chamber wall: y=25, wall_flag=4.
    [0.0,  1.0, -25.0,  2.0, 25.0, 80.0, 25.0, 4.0]
);

// Converging nozzle walls: x=80 through x=90.
linear_wall_segments = (
    // Lower nozzle wall: y=0.5*x-35, wall_flag=3.
    [0.5, -1.0, -35.0, 80.0,  5.0, 90.0, 10.0, 3.0],
    // Upper nozzle wall: y=65-0.5*x, wall_flag=4.
    [0.5,  1.0, -65.0, 80.0, 25.0, 90.0, 20.0, 4.0]
);

// --------------------------------------------------------------------------
// Piston and initial mobile-particle velocity
// --------------------------------------------------------------------------
piston_start_frame = 20;
piston_velocity = [0.05, 0.0, 0.0];

// --------------------------------------------------------------------------
// Particle packing
// --------------------------------------------------------------------------
radius = 0.1;

// Absolute surface-to-surface distance between adjacent packed particles.
particle_separation_distance = 0.1;

// --------------------------------------------------------------------------
// Permanent mobile-particle death planes
// --------------------------------------------------------------------------
// Order:
//   x_min, x_max,
//   y_min, y_max,
//   z_min, z_max
death_bounds = [
     1.0, 95.0,
     1.0, 29.0,
     0.0,  4.0
];

// --------------------------------------------------------------------------
// Preview and game-camera bounds
// --------------------------------------------------------------------------
x_axis_lims = [0.0, 96.0];
y_axis_lims = [0.0, 30.0];
z_axis_lims = [0.0,  4.0];
view_center = [48.0, 15.0, 2.0];

// --------------------------------------------------------------------------
// Integration and output
// --------------------------------------------------------------------------
dt = 0.5;

study = false;
num_studies = 0;

output_file_prefix = "BoundaryParticleReservoirHorizontalVk";
